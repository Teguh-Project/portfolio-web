<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teguh Perwira — Fullstack Creative</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- FONT GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body> <!-- Atribut data-theme akan diatur otomatis oleh script.js ke tag <html> -->

    <!-- UI ELEMENTS -->
    <div class="custom-cursor"></div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="#home" class="logo">
                    <img src="assets/images/logo-white.png" alt="TEGUH.P" class="logo-img">
                </a>
            </div>
            
            <div class="nav-menu desktop-only">
                <a href="#work" class="nav-link"><span>01</span> WORK</a>
                <a href="#contact" class="nav-link"><span>02</span> CONTACT</a>
            </div>
            
            <div class="nav-right">
                <button id="themeToggle" class="theme-toggle-nav">
                    <span class="mode-text">LIGHT</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="scroll-content">
        <section id="home" class="hero-brutal">
    <!-- Background GIF Layer -->
    <div class="hero-bg-visual">
        <img src="assets/images/giff.gif" alt="Background" class="hero-gif-bg">
        <div class="hero-vignette"></div>
    </div>

    <!-- Header Info (Top Bar inside Hero) -->
    <div class="hero-top-info">
        <div class="info-item">
            <span class="label-mono-bold">BASED IN</span><br>
            <span class="label-mono-bold">MALANG, IDN</span>
        </div>
        <div class="info-item text-right">
            <span class="label-mono-bold">STATUS</span><br>
            <span class="label-mono-bold">● AVAILABLE FOR 2026</span>
        </div>
    </div>

    <!-- Main Title (Center) -->
    <div class="hero-center-content">
        <h1 class="sporty-title reveal-init">FULLSTACK</h1>
        <h1 class="sporty-title outline reveal-init">CREATIVE</h1>
        <h1 class="sporty-title reveal-init">DESIGNER</h1>
    </div>
</section>

        <!-- WORK SECTION -->
        <section id="work" class="section">
            <div class="work-grid">
                <div class="project-card featured reveal-init">
                    <div class="work-img-wrapper">
                        <img src="assets/images/project1.webp" alt="Work">
                    </div>
                    <div class="project-meta">
                        <h3>Digital Identity System</h3>
                        <span class="label-mono">UI/UX — 2026</span>
                    </div>
                </div>
                
                <div class="project-card reveal-init">
                    <div class="work-img-wrapper">
                        <img src="assets/images/project2.webp" alt="Work">
                    </div>
                    <div class="project-meta">
                        <h3>Social Ecosystem</h3>
                        <span class="label-mono">CONTENT STRATEGY</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- CONTACT SECTION -->
        <section id="contact" class="section">
            <h2 class="massive-type reveal-init">LET'S <br>CONNECT</h2>
            <a href="mailto:halo@teguh.com" class="giant-email-link reveal-init">HALO@TEGUH.COM</a>
            
            <div class="contact-footer" style="margin-top: 5rem;">
                <div class="footer-info">
                    <span class="label-mono">LOCAL TIME</span><br>
                    <span id="local-time" class="label-mono">00:00:00 MALANG, IDN</span>
                </div>
                <div class="social-links">
                    <a href="#" class="label-mono">INSTAGRAM</a>
                    <a href="#" class="label-mono" style="margin-left: 20px;">LINKEDIN</a>
                </div>
            </div>
        </section>

        <footer style="padding: 2rem var(--padding-x); border-top: 1px solid var(--border-color);">
            <span class="label-mono" style="opacity: 0.3;">© 2026 TEGUH P.P — ALL RIGHTS RESERVED</span>
        </footer>
    </main>

    <!-- BACK TO TOP -->
    <button id="backToTop" class="back-to-top">
        <span class="label-mono">UP ↑</span>
    </button>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
</body>
</html>
